{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Se déconnecter" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">{% trans "Se déconnecter" %}</h1>
        <p class="text-muted">{% trans "Confirme la déconnexion." %}</p>

        <form method="post" action="{% url 'account_logout' %}" class="d-flex gap-2">
          {% csrf_token %}
          <a class="btn btn-outline-secondary w-50" href="{% url 'home' %}">
            {% trans "Annuler" %}
          </a>
          <button class="btn btn-danger w-50" type="submit">
            {% trans "Logout" %}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
