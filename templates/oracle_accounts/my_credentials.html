<button id="test-btn" type="button" class="btn btn-secondary">
    Tester la connexion
</button>

<script>
document.getElementById("test-btn").addEventListener("click", function() {
    fetch("{% url 'oracle_accounts:test_connection' %}")
        .then(r => r.json())
        .then(data => {
            if (data.status === "success") {
                alert("Connexion OK");
            } else {
                alert("Erreur: " + data.message);
            }
        });
});
</script>
