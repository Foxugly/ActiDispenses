{% extends "base.html" %}

{% block title %}Requete invalide{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center py-5">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle text-warning" style="font-size: 4rem;"></i>
                    </div>
                    <h1 class="display-4 fw-bold text-warning">400</h1>
                    <h3 class="mb-3">Requete invalide</h3>
                    <p class="text-muted mb-4">
                        La demande envoyee a l'application n'a pas pu etre comprise ou contient des donnees invalides.
                    </p>
                    <div class="rounded-4 border border-warning-subtle bg-warning-subtle p-4 mb-4 text-start">
                        <div class="fw-semibold mb-2">Detail</div>
                        <div class="text-muted">{{ error_message }}</div>
                    </div>
                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="history.back()" class="btn btn-warning">
                            <i class="bi bi-arrow-left me-1"></i>
                            Retour
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-house-door me-1"></i>
                            Accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
