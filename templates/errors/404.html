{% extends "base.html" %}

{% block title %}Page introuvable{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center py-5">
                    <div class="mb-4">
                        <i class="bi bi-signpost-split text-warning" style="font-size: 4rem;"></i>
                    </div>
                    <h1 class="display-4 fw-bold text-warning">404</h1>
                    <h3 class="mb-3">Page introuvable</h3>
                    <p class="text-muted mb-4">
                        L'URL demandee n'existe pas ou n'est plus disponible.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'home' %}" class="btn btn-primary">
                            <i class="bi bi-house-door me-1"></i>
                            Retour a l'accueil
                        </a>
                        <a href="{% url 'about' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-info-circle me-1"></i>
                            A propos
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
