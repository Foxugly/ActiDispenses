{% extends "base.html" %}

{% block title %}Erreur interne{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center py-5">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-octagon text-danger" style="font-size: 4rem;"></i>
                    </div>
                    <h1 class="display-4 fw-bold text-danger">500</h1>
                    <h3 class="mb-3">Erreur interne</h3>
                    <p class="text-muted mb-4">
                        Une erreur inattendue est survenue pendant le traitement de la demande.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="location.reload()" class="btn btn-danger">
                            <i class="bi bi-arrow-clockwise me-1"></i>
                            Recharger
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-house-door me-1"></i>
                            Accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
